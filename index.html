<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KUON STUDIO</title>
  <meta name="description" content="KUON STUDIO" />
  <meta name="theme-color" content="#ffffff" />

  <style>
    :root{
      --bg:#ffffff;
      --fg:#111;

      --baseline:52vh;
      --sub-gap:22px;
      --nav-gap:54px;

      --panel-gap:22px;
      --item-gap:18px;

      --muted-1: rgba(0,0,0,0.66);
      --muted-2: rgba(0,0,0,0.72);
      --muted-3: rgba(0,0,0,0.56);
      --muted-4: rgba(0,0,0,0.34);

      --pad-x:64px;
      --pad-y:56px;

      --mark: rgba(0,0,0,0.18);
      --mark-h:1px;
      --mark-l:22px;
      --mark-gap:18px;

      --logo-size:56px;
      --logo-track:0.18em;
      --logo-pad:0.18em;

      --sub-size:13px;
      --sub-line:1.8;

      --nav-size:11px;
      --nav-track:0.24em;

      --panel-width:620px;

      --swap-ms:1700ms;
      --swap-ease:cubic-bezier(.35,0,.25,1);
      --swap-inset-y:6px;
      --swap-inset-x:12px;

      --logo-line-h: calc(var(--logo-size) * 1.08);
      --sub-line-h: calc(var(--sub-size) * 1.8 * 2);
      --nav-line-h: 18px;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      overflow:hidden;
      font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .wrap{
      height:100%;
      width:100%;
      padding:var(--pad-y) var(--pad-x);
      position:relative;
    }

    .crop{
      position:fixed;
      width:calc(var(--mark-l) + 2px);
      height:calc(var(--mark-l) + 2px);
      pointer-events:none;
      z-index:5;
      opacity:0.78;
      transition:opacity 300ms ease;
    }
    body:hover .crop{ opacity:1; }

    .crop::before,
    .crop::after{
      content:"";
      position:absolute;
      background:var(--mark);
    }
    .crop::before{ height:var(--mark-h); width:var(--mark-l); top:0; left:0; }
    .crop::after{ width:var(--mark-h); height:var(--mark-l); top:0; left:0; }

    .crop.tl{ top:var(--mark-gap); left:var(--mark-gap); }
    .crop.tr{ top:var(--mark-gap); right:var(--mark-gap); transform:scaleX(-1); }
    .crop.bl{ bottom:var(--mark-gap); left:var(--mark-gap); transform:scaleY(-1); }
    .crop.br{ bottom:var(--mark-gap); right:var(--mark-gap); transform:scale(-1); }

    .center{
      position:absolute;
      left:50%;
      top:var(--baseline);
      transform:translate(-50%, -50%);
      width:min(980px, calc(100% - 40px));
      text-align:center;
    }

    .hero{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:var(--sub-gap);
    }

    .swapBox{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .swapBox::before{
      content:"";
      position:absolute;
      inset:calc(-1 * var(--swap-inset-y)) calc(-1 * var(--swap-inset-x));
      background:var(--bg);
      opacity:0;
      pointer-events:none;
    }

    @keyframes curtain{
      0%   { opacity:0; }
      45%  { opacity:1; }
      55%  { opacity:1; }
      100% { opacity:0; }
    }

    .swapBox.is-swapping::before{
      animation: curtain var(--swap-ms) var(--swap-ease) both;
    }

    .logoBox{
      min-height:var(--logo-line-h);
      height:var(--logo-line-h);
    }

    .subBox{
      min-height:var(--sub-line-h);
      max-width: 62ch;
    }

    .logo{
      margin:0;
      font-weight:700;
      letter-spacing:var(--logo-track);
      font-size:var(--logo-size);
      line-height:1;
      padding-left:var(--logo-pad);
      white-space:nowrap;
    }

    .subtitle{
      margin:0;
      font-size:var(--sub-size);
      letter-spacing:0.12em;
      line-height:var(--sub-line);
      color:var(--muted-1);
      text-align:center;
    }

    .navRow{
      margin-top:var(--nav-gap);
      display:flex;
      justify-content:center;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .navBtn{
      border:0;
      background:transparent;
      padding:4px 2px;
      cursor:pointer;
      color:var(--muted-3);
      font-size:var(--nav-size);
      font-weight:400;
      letter-spacing:var(--nav-track);
      text-transform:uppercase;
      white-space:nowrap;
      position:relative;
      transition: color 160ms ease;
    }

    .navBtn:hover{ color:var(--fg); }
    .navBtn.is-active{ color:rgba(0,0,0,0.80); }

    .navBtn.is-active::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:-3px;
      height:1px;
      background:rgba(0,0,0,0.24);
    }

    .navBtn:focus{ outline:none; }
    .navBtn:focus-visible{
      outline:1px solid rgba(0,0,0,0.18);
      outline-offset:4px;
      border-radius:6px;
    }

    .panel{
      margin-top:var(--panel-gap);
      width:min(var(--panel-width), 100%);
      margin-left:auto;
      margin-right:auto;
      opacity:1;
      transform:none;
    }

    .panelInner{
      display:grid;
      gap:var(--item-gap);
      justify-items:center;
    }

    .bodyText{
      margin:0;
      font-size:13px;
      letter-spacing:0.12em;
      color:var(--muted-1);
      max-width:60ch;
      line-height:1.8;
      text-align:center;
    }

    .workList{
      display:grid;
      gap:18px;
      width:min(620px, 100%);
      margin:0 auto;
    }

    .workItem{
      display:grid;
      gap:7px;
      justify-items:center;
    }

    .workTitle{
      margin:0;
      font-size:11px;
      letter-spacing:0.22em;
      text-transform:uppercase;
      color:rgba(0,0,0,0.78);
    }

    .workDesc{
      margin:0;
      font-size:13px;
      letter-spacing:0.12em;
      color:var(--muted-1);
      line-height:1.8;
      max-width:58ch;
      text-align:center;
    }

    .email{
      font-size:12px;
      letter-spacing:0.14em;
      color:var(--muted-2);
      text-decoration:none;
      padding:4px 10px;
      transition: color 160ms ease;
    }
    .email:hover{ color:var(--fg); }

    .smallLabel{
      margin:0;
      font-size:11px;
      letter-spacing:0.20em;
      text-transform:uppercase;
      color:var(--muted-4);
    }

    .bottom{
      position:fixed;
      left:0;
      right:0;
      bottom:var(--mark-gap);
      padding:0 var(--pad-x);
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:24px;
      pointer-events:none;
    }

    .bottom .left,
    .bottom .right{
      font-size:11px;
      letter-spacing:0.14em;
      color:rgba(0,0,0,0.34);
      line-height:1.6;
      white-space:nowrap;
      text-transform:uppercase;
    }

    .bottom .right{ text-align:right; }

    @media (prefers-reduced-motion: reduce){
      .swapBox.is-swapping::before{ animation:none; opacity:0; }
    }

    @media (max-width: 720px){
      :root{
        --pad-x:22px;
        --pad-y:40px;
        --logo-size:42px;
        --logo-track:0.14em;
        --logo-pad:0.14em;
        --mark-l:18px;
        --mark-gap:14px;
        --sub-size:12px;
      }

      .navRow{
        gap:14px;
      }

      .bottom .left,
      .bottom .right{
        white-space:normal;
      }
    }
  </style>
</head>

<body>
  <div class="crop tl" aria-hidden="true"></div>
  <div class="crop tr" aria-hidden="true"></div>
  <div class="crop bl" aria-hidden="true"></div>
  <div class="crop br" aria-hidden="true"></div>

  <div class="wrap">
    <main class="center" aria-label="KUON STUDIO">

      <div class="hero">
        <div class="swapBox logoBox" id="logoSwap">
          <h1 class="logo" id="logoText">KUON STUDIO</h1>
        </div>

        <div class="swapBox subBox" id="subSwap">
          <p class="subtitle" id="subText">
            Objects, sound, and spatial design.
          </p>
        </div>
      </div>

      <div class="navRow" aria-label="Section navigation">
        <button class="navBtn is-active" type="button" data-panel="studio">Studio</button>
        <button class="navBtn" type="button" data-panel="work">Work</button>
        <button class="navBtn" type="button" data-panel="contact">Contact</button>
      </div>

      <div class="panel" aria-live="polite">
        <div class="swapBox" id="panelSwap">
          <div class="panelInner" id="panelInner">
            <!-- injected by JS -->
          </div>
        </div>
      </div>

    </main>
  </div>

  <footer class="bottom" aria-label="Footer info">
    <div class="left">KUON</div>
    <div class="right">TAIPEI | LONDON</div>
  </footer>

  <script>
    const prefersReducedMotion =
      window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    const SWAP_TOTAL_MS = 1700;
    const SWAP_AT_MS = Math.round(SWAP_TOTAL_MS * 0.50);

    const panelContent = {
      studio: `
        <p class="bodyText">
          KUON Studio is a design-led practice exploring sound, material, and form across products, environments, and experimental concepts.
        </p>
        <p class="bodyText">
          The studio brings together technical development and a quieter, more atmospheric visual language.
        </p>
      `,
      work: `
        <div class="workList">

          <div class="workItem">
            <h2 class="workTitle">Neostein</h2>
            <p class="workDesc">
              Product direction and development within high-performance audio and architectural integration.
            </p>
          </div>

          <div class="workItem">
            <h2 class="workTitle">Guitar Project</h2>
            <p class="workDesc">
              A studio-led instrument study shaped by form, material, and expression.
            </p>
          </div>

          <div class="workItem">
            <h2 class="workTitle">In Development</h2>
            <p class="workDesc">
              Emerging concepts in sound, objects, and spatial experience.
            </p>
          </div>

        </div>
      `,
      contact: `
        <p class="smallLabel">For studio enquiries, collaborations, and selected projects</p>
        <a class="email" href="mailto:info@kuon.studio">info@kuon.studio</a>
      `
    };

    const panelInner = document.getElementById("panelInner");
    const panelSwap = document.getElementById("panelSwap");
    const navButtons = Array.from(document.querySelectorAll(".navBtn"));

    let currentPanel = "studio";

    function startCurtain(box){
      box.classList.remove("is-swapping");
      void box.offsetWidth;
      box.classList.add("is-swapping");
    }

    function stopCurtain(box){
      box.classList.remove("is-swapping");
    }

    function curtainSwap(boxes, applyNewContent){
      if (prefersReducedMotion){
        applyNewContent();
        return;
      }

      boxes.forEach(startCurtain);
      setTimeout(applyNewContent, SWAP_AT_MS);
      setTimeout(() => boxes.forEach(stopCurtain), SWAP_TOTAL_MS);
    }

    function setActiveButton(panelKey){
      navButtons.forEach(btn => {
        btn.classList.toggle("is-active", btn.dataset.panel === panelKey);
      });
    }

    function renderPanel(panelKey){
      panelInner.innerHTML = panelContent[panelKey];
      setActiveButton(panelKey);
    }

    function setPanel(panelKey){
      if (!panelContent[panelKey] || panelKey === currentPanel) return;
      currentPanel = panelKey;

      curtainSwap([panelSwap], () => {
        renderPanel(panelKey);
      });
    }

    navButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        setPanel(btn.dataset.panel);
      });
    });

    renderPanel("studio");
  </script>
</body>
</html>
