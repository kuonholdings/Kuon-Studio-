<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KUON STUDIO</title>
  <meta name="description" content="KUON STUDIO" />
  <meta name="theme-color" content="#ffffff" />

  <style>
    :root{
      --bg:#ffffff;
      --fg:#111111;
      --fg-soft:rgba(108,98,88,0.68);
      --muted-1:rgba(0,0,0,0.80);
      --muted-2:rgba(0,0,0,0.62);
      --muted-3:rgba(0,0,0,0.42);
      --muted-4:rgba(0,0,0,0.24);

      --pad-x:64px;
      --pad-y:56px;

      --mark:rgba(0,0,0,0.18);
      --mark-h:1px;
      --mark-l:22px;
      --mark-gap:18px;

      --hero-top:51vh;

      --logo-size:56px;
      --logo-track:0.15em;
      --logo-pad:0.15em;
      --logo-line-h:calc(var(--logo-size) * 1.12);

      --meta-size:12px;
      --meta-track:0.15em;

      --sub-size:16px;
      --sub-line:1.55;
      --sub-track:0.04em;
      --sub-gap:20px;

      --nav-size:12px;
      --nav-track:0.22em;
      --nav-gap:30px;
      --nav-line-h:20px;

      --loc-size:12px;
      --loc-track:0.16em;
      --loc-gap:30px;

      --body-size:14px;
      --body-line:1.85;
      --body-track:0.10em;

      --panel-gap:18px;
      --panel-width:640px;
      --panel-min-h:130px;

      --line-y-gap:18px;
      --horizon-color:rgba(120,110,100,0.20);

      --swap-ms:1100ms;
      --swap-ease:cubic-bezier(.35,0,.25,1);
      --swap-inset-y:6px;
      --swap-inset-x:12px;

      --intro-brand-ms:1000ms;
      --intro-division-ms:1000ms;
      --intro-line-ms:1100ms;
      --intro-rest-ms:1000ms;
      --intro-delay-1:260ms;
      --intro-delay-2:760ms;
      --intro-delay-3:1380ms;
      --intro-delay-4:2000ms;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      overflow:hidden;
      font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    a, button{ -webkit-tap-highlight-color:transparent; }

    .wrap{
      position:relative;
      width:100%;
      height:100%;
      padding:var(--pad-y) var(--pad-x);
    }

    .crop{
      position:fixed;
      width:calc(var(--mark-l) + 2px);
      height:calc(var(--mark-l) + 2px);
      pointer-events:none;
      z-index:1;
      opacity:0.78;
      transition:opacity 300ms ease;
    }
    body:hover .crop{ opacity:1; }

    .crop::before,
    .crop::after{
      content:"";
      position:absolute;
      background:var(--mark);
    }
    .crop::before{
      width:var(--mark-l);
      height:1px;
      top:0;
      left:0;
    }
    .crop::after{
      width:1px;
      height:var(--mark-l);
      top:0;
      left:0;
    }

    .crop.tl{ top:var(--mark-gap); left:var(--mark-gap); }
    .crop.tr{ top:var(--mark-gap); right:var(--mark-gap); transform:scaleX(-1); }
    .crop.bl{ bottom:var(--mark-gap); left:var(--mark-gap); transform:scaleY(-1); }
    .crop.br{ bottom:var(--mark-gap); right:var(--mark-gap); transform:scale(-1); }

    .corner{
      position:fixed;
      z-index:2;
      font-size:var(--meta-size);
      letter-spacing:var(--meta-track);
      text-transform:uppercase;
      line-height:1.6;
      white-space:nowrap;
    }

    .top-left{
      top:calc(var(--mark-gap) - 2px);
      left:calc(var(--mark-gap) + 34px);
    }
    .top-right{
      top:calc(var(--mark-gap) - 2px);
      right:calc(var(--mark-gap) + 34px);
      color:var(--muted-3);
      font-variant-numeric:tabular-nums;
      text-align:right;
      user-select:none;
    }
    .bottom-left{
      left:calc(var(--mark-gap) + 34px);
      bottom:calc(var(--mark-gap) - 2px);
      color:var(--muted-3);
      pointer-events:none;
    }
    .bottom-right{
      right:calc(var(--mark-gap) + 34px);
      bottom:calc(var(--mark-gap) - 2px);
      text-align:right;
    }

    .sister-link{
      color:var(--muted-3);
      text-decoration:none;
      transition:color 180ms ease;
    }
    .sister-link:hover{ color:var(--fg); }

    .lang-switch{
      display:flex;
      align-items:center;
      gap:10px;
    }
    .lang-btn{
      background:transparent;
      border:0;
      padding:0;
      cursor:pointer;
      color:var(--muted-3);
      transition:color 180ms ease;
      font:inherit;
      letter-spacing:inherit;
      text-transform:inherit;
    }
    .lang-btn:hover{ color:var(--fg); }
    .lang-btn[aria-current="true"]{ color:rgba(0,0,0,0.82); }
    .lang-sep{
      color:var(--muted-4);
      pointer-events:none;
    }

    .center{
      position:absolute;
      left:50%;
      top:var(--hero-top);
      transform:translate(-50%, -50%);
      width:min(980px, calc(100% - 40px));
      text-align:center;
    }

    .hero{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      min-height:400px;
    }

    .logoBox{
      height:var(--logo-line-h);
      min-height:var(--logo-line-h);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .logo{
      margin:0;
      font-size:var(--logo-size);
      line-height:1;
      letter-spacing:var(--logo-track);
      padding-left:var(--logo-pad);
      white-space:nowrap;
      font-weight:700;
    }
    .logo .brand{ color:var(--fg); }
    .logo .division{ color:var(--fg-soft); }

    .horizonWrap{
      width:100%;
      margin-top:var(--line-y-gap);
      padding:0 calc(var(--mark-gap) + 34px);
    }
    .horizon{
      height:1px;
      background:var(--horizon-color);
      transform:scaleX(0);
      transform-origin:center center;
    }

    .subtitle{
      margin:18px 0 0;
      max-width:60ch;
      min-height:34px;
      font-size:var(--sub-size);
      line-height:var(--sub-line);
      letter-spacing:var(--sub-track);
      color:var(--muted-1);
      text-align:center;
      font-weight:500;
    }

    .nav{
      margin-top:var(--nav-gap);
      min-height:var(--nav-line-h);
      display:flex;
      justify-content:center;
      align-items:center;
      gap:22px;
      flex-wrap:wrap;
    }
    .nav button{
      background:transparent;
      border:0;
      padding:0;
      cursor:pointer;
      font-size:var(--nav-size);
      letter-spacing:var(--nav-track);
      text-transform:uppercase;
      color:var(--muted-3);
      transition:color 180ms ease;
      position:relative;
    }
    .nav button:hover{ color:var(--fg); }
    .nav button.active{ color:rgba(0,0,0,0.82); }
    .nav button.active::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:-4px;
      height:1px;
      background:rgba(0,0,0,0.22);
    }

    .locationStatic{
      margin:var(--loc-gap) 0 0;
      min-height:20px;
      font-size:var(--loc-size);
      line-height:1.7;
      letter-spacing:var(--loc-track);
      text-transform:uppercase;
      color:var(--muted-3);
      text-align:center;
    }

    .panel{
      width:min(var(--panel-width), 100%);
      min-height:var(--panel-min-h);
      margin:22px auto 0;
      display:flex;
      align-items:flex-start;
      justify-content:center;
    }

    .panelInner{
      width:100%;
      display:grid;
      gap:var(--panel-gap);
      justify-items:center;
    }

    .body{
      margin:0;
      max-width:60ch;
      font-size:var(--body-size);
      line-height:var(--body-line);
      letter-spacing:var(--body-track);
      color:var(--muted-1);
      text-align:center;
    }

    .email{
      font-size:13px;
      line-height:1.7;
      letter-spacing:0.12em;
      text-decoration:none;
      color:var(--muted-2);
      transition:color 160ms ease;
    }
    .email:hover{ color:var(--fg); }

    .swapBox{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:100%;
    }
    .swapBox::before{
      content:"";
      position:absolute;
      inset:calc(-1 * var(--swap-inset-y)) calc(-1 * var(--swap-inset-x));
      background:var(--bg);
      opacity:0;
      pointer-events:none;
    }
    @keyframes curtain{
      0%{ opacity:0; }
      45%{ opacity:1; }
      55%{ opacity:1; }
      100%{ opacity:0; }
    }
    .swapBox.is-swapping::before{
      animation:curtain var(--swap-ms) var(--swap-ease) both;
    }

    .intro-brand,
    .intro-division,
    .intro-line,
    .intro-rest{
      opacity:0;
      transform:translateY(10px);
    }

    .is-ready .intro-brand{
      animation:introRise var(--intro-brand-ms) cubic-bezier(.22,.61,.36,1) var(--intro-delay-1) forwards;
    }
    .is-ready .intro-division{
      animation:introRise var(--intro-division-ms) cubic-bezier(.22,.61,.36,1) var(--intro-delay-2) forwards;
    }
    .is-ready .intro-line{
      animation:introRise var(--intro-line-ms) cubic-bezier(.22,.61,.36,1) var(--intro-delay-3) forwards;
    }
    .is-ready .intro-line .horizon{
      animation:lineDraw var(--intro-line-ms) cubic-bezier(.22,.61,.36,1) var(--intro-delay-3) forwards;
    }
    .is-ready .intro-rest{
      animation:introRise var(--intro-rest-ms) cubic-bezier(.22,.61,.36,1) var(--intro-delay-4) forwards;
    }

    @keyframes introRise{
      from{ opacity:0; transform:translateY(10px); }
      to{ opacity:1; transform:translateY(0); }
    }
    @keyframes lineDraw{
      from{ transform:scaleX(0); }
      to{ transform:scaleX(1); }
    }

    @media (prefers-reduced-motion: reduce){
      .swapBox.is-swapping::before{ animation:none; opacity:0; }
      .intro-brand,
      .intro-division,
      .intro-line,
      .intro-rest{
        opacity:1;
        transform:none;
        animation:none !important;
      }
      .horizon{ transform:scaleX(1); }
    }

    @media (max-width: 720px){
      :root{
        --pad-x:22px;
        --pad-y:40px;
        --mark-l:18px;
        --mark-gap:14px;
        --hero-top:50vh;
        --logo-size:42px;
        --logo-track:0.12em;
        --logo-pad:0.12em;
        --sub-size:15px;
        --meta-size:11px;
        --nav-size:11px;
        --body-size:13px;
        --loc-gap:26px;
      }

      .top-left{ left:calc(var(--mark-gap) + 28px); }
      .top-right{ right:calc(var(--mark-gap) + 28px); }
      .bottom-left{ left:calc(var(--mark-gap) + 28px); }
      .bottom-right{ right:calc(var(--mark-gap) + 28px); }

      .nav{ gap:16px; }
      .horizonWrap{ padding:0 calc(var(--mark-gap) + 28px); }
    }
  </style>
</head>

<body>
  <div class="crop tl" aria-hidden="true"></div>
  <div class="crop tr" aria-hidden="true"></div>
  <div class="crop bl" aria-hidden="true"></div>
  <div class="crop br" aria-hidden="true"></div>

  <div class="corner top-left intro-rest">
    <a class="sister-link" href="https://kuonholdings.com">HOLDINGS</a>
  </div>

  <div class="corner top-right intro-rest">
    <span id="clockText">—</span>
  </div>

  <div class="corner bottom-left intro-rest">
    <span id="footerBrand">KUON</span>
  </div>

  <div class="corner bottom-right intro-rest">
    <div class="lang-switch" aria-label="Language selector">
      <button class="lang-btn" type="button" data-lang="en" aria-current="true">EN</button>
      <span class="lang-sep">/</span>
      <button class="lang-btn" type="button" data-lang="zh-Hant">繁中</button>
    </div>
  </div>

  <div class="wrap">
    <main class="center" aria-label="KUON STUDIO">
      <div class="hero">
        <div class="logoBox">
          <h1 class="logo">
            <span class="brand intro-brand">KUON</span>
            <span class="division intro-division">STUDIO</span>
          </h1>
        </div>

        <div class="horizonWrap intro-line">
          <div class="horizon"></div>
        </div>

        <p class="subtitle intro-rest" id="subtitle">Sound Architecture Practice</p>

        <div class="nav intro-rest" id="nav">
          <button data-panel="studio" class="active" type="button">STUDIO</button>
          <button data-panel="work" type="button">WORK</button>
          <button data-panel="contact" type="button">CONTACT</button>
        </div>

        <p class="locationStatic intro-rest" id="locationStatic">Taipei / London</p>

        <div class="panel intro-rest">
          <div class="swapBox" id="panelSwap">
            <div id="panelInner" class="panelInner"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const prefersReducedMotion =
      window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    const SWAP_TOTAL_MS = 1100;
    const SWAP_AT_MS = Math.round(SWAP_TOTAL_MS * 0.50);

    const CONTENT = {
      "en": {
        htmlLang: "en",
        footerBrand: "KUON",
        subtitle: "Sound Architecture Practice",
        location: "Taipei / London",
        nav: {
          studio: "STUDIO",
          work: "WORK",
          contact: "CONTACT"
        },
        panels: {
          studio: `
            <p class="body">
              Design research, product thinking, and architectural audio development.
            </p>
          `,
          work: `
            <p class="body">
              Selected work includes Neostein, ongoing instrument studies, and experimental audio objects.
            </p>
          `,
          contact: `
            <a class="email" href="mailto:hello@kuon.studio">hello@kuon.studio</a>
          `
        },
        clockZone: "Europe/London",
        clockLabel: "LDN"
      },
      "zh-Hant": {
        htmlLang: "zh-Hant",
        footerBrand: "久音",
        subtitle: "聲音建築實踐",
        location: "台北 / 倫敦",
        nav: {
          studio: "工作室",
          work: "作品",
          contact: "聯絡"
        },
        panels: {
          studio: `
            <p class="body">
              設計研究、產品思維與建築音響開發。
            </p>
          `,
          work: `
            <p class="body">
              代表性項目包括 Neostein、持續進行中的樂器研究，以及實驗性聲音物件。
            </p>
          `,
          contact: `
            <a class="email" href="mailto:hello@kuon.studio">hello@kuon.studio</a>
          `
        },
        clockZone: "Asia/Taipei",
        clockLabel: "TPE"
      }
    };

    let currentLang = "en";
    let currentPanel = "studio";

    const clockText = document.getElementById("clockText");
    const footerBrand = document.getElementById("footerBrand");
    const subtitle = document.getElementById("subtitle");
    const locationStatic = document.getElementById("locationStatic");
    const panelInner = document.getElementById("panelInner");
    const panelSwap = document.getElementById("panelSwap");
    const navButtons = Array.from(document.querySelectorAll(".nav button"));
    const langButtons = Array.from(document.querySelectorAll(".lang-btn"));

    function partsForTZ(date, timeZone){
      const fmt = new Intl.DateTimeFormat("en-GB", {
        timeZone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });
      const parts = fmt.formatToParts(date);
      const get = (type) => parts.find(p => p.type === type)?.value || "";
      return {
        Y: get("year"),
        M: get("month"),
        D: get("day"),
        h: get("hour"),
        m: get("minute")
      };
    }

    function formatClock(date, langKey){
      const { clockZone, clockLabel } = CONTENT[langKey];
      const p = partsForTZ(date, clockZone);
      return `${p.Y}.${p.M}.${p.D} ${p.h}:${p.m} ${clockLabel}`;
    }

    function updateClock(){
      clockText.textContent = formatClock(new Date(), currentLang);
    }

    function startCurtain(box){
      box.classList.remove("is-swapping");
      void box.offsetWidth;
      box.classList.add("is-swapping");
    }

    function stopCurtain(box){
      box.classList.remove("is-swapping");
    }

    function curtainSwap(boxes, applyNewContent){
      if (prefersReducedMotion){
        applyNewContent();
        return;
      }
      boxes.forEach(startCurtain);
      setTimeout(applyNewContent, SWAP_AT_MS);
      setTimeout(() => boxes.forEach(stopCurtain), SWAP_TOTAL_MS);
    }

    function setActiveLang(langKey){
      langButtons.forEach(btn => {
        if (btn.dataset.lang === langKey) btn.setAttribute("aria-current", "true");
        else btn.removeAttribute("aria-current");
      });
    }

    function setActivePanel(panelKey){
      navButtons.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.panel === panelKey);
      });
    }

    function renderPanel(panelKey){
      panelInner.innerHTML = CONTENT[currentLang].panels[panelKey];
      setActivePanel(panelKey);
    }

    function applyLanguage(langKey){
      const c = CONTENT[langKey];
      document.documentElement.lang = c.htmlLang;
      footerBrand.textContent = c.footerBrand;
      subtitle.textContent = c.subtitle;
      locationStatic.textContent = c.location;

      navButtons.forEach(btn => {
        const key = btn.dataset.panel;
        btn.textContent = c.nav[key];
      });

      renderPanel(currentPanel);
      setActiveLang(langKey);
      updateClock();
    }

    function setLanguage(langKey){
      if (!CONTENT[langKey] || langKey === currentLang) return;
      currentLang = langKey;
      curtainSwap([panelSwap], () => applyLanguage(langKey));
    }

    function setPanel(panelKey){
      if (!CONTENT[currentLang].panels[panelKey] || panelKey === currentPanel) return;
      currentPanel = panelKey;
      curtainSwap([panelSwap], () => renderPanel(panelKey));
    }

    navButtons.forEach(btn => {
      btn.addEventListener("click", () => setPanel(btn.dataset.panel));
    });

    langButtons.forEach(btn => {
      btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
    });

    applyLanguage("en");
    updateClock();
    setInterval(updateClock, 10000);

    if (!prefersReducedMotion) {
      requestAnimationFrame(() => document.body.classList.add("is-ready"));
    } else {
      document.body.classList.add("is-ready");
    }
  </script>
</body>
</html>
