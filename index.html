<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KUON STUDIO | 久音</title>

  <style>
    :root {
      --bg: #faf8f4;
      --text: #111;
      --muted: rgba(0,0,0,0.5);
      --light: rgba(0,0,0,0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: grid;
      grid-template-columns: auto 1px auto;
      gap: 40px;
      align-items: center;
      width: min(1100px, 90%);
      opacity: 0;
      transform: translateY(8px);
      animation: fadeIn 1.2s ease forwards;
    }

    /* LEFT INFO */
    .info {
      text-align: right;
      display: flex;
      flex-direction: column;
      justify-content: center;
      font-size: 0.78rem;
      line-height: 1.35;
      letter-spacing: 0.08em;
      min-height: 90px;
    }

    .practice {
      color: var(--text);
      margin-bottom: 0px;
    }

    .locations {
      color: var(--text);
      margin-bottom: 12px;
    }

    .email {
      display: inline-block;
      align-self: flex-end;
      color: var(--light);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      transition: color 0.18s ease, text-decoration-color 0.18s ease;
    }

    .email:hover {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 0.14em;
      text-decoration-color: currentColor;
    }

    /* DIVIDER */
    .line {
      width: 1px;
      height: 90px;
      background: var(--light);
    }

    /* RIGHT TITLE */
    .title {
      font-size: clamp(2.6rem, 6.2vw, 5.2rem);
      font-weight: 600;
      line-height: 0.9;
      letter-spacing: -0.03em;
    }

    .studio {
      color: var(--light);
      font-weight: 500;
    }

    .kanji {
      font-size: 0.9em;
      color: var(--light);
      margin-top: 0.2em;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .container {
        opacity: 1;
        transform: none;
        animation: none;
      }
    }

    /* MOBILE */
    @media (max-width: 700px) {
      .container {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .info {
        text-align: left;
        min-height: auto;
      }

      .email {
        align-self: flex-start;
      }

      .line {
        display: none;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LEFT -->
    <div class="info">
      <div class="practice">Sound Architecture Practice</div>
      <div class="locations">London / Taipei</div>
      <a href="mailto:hello@kuon.studio" class="email">hello@kuon.studio</a>
    </div>

    <!-- DIVIDER -->
    <div class="line"></div>

    <!-- RIGHT -->
    <div class="title">
      KUON<br>
      <span class="studio">STUDIO</span><br>
      <div class="kanji">久音</div>
    </div>

  </div>

</body>
</html>
