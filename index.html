<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KUON STUDIO | 久音</title>

    <style>
      :root {
        --bg: #f3f1ec;
        --text: #111;
        --soft: rgba(0,0,0,0.28);
        --mid: rgba(0,0,0,0.45);
        --muted: rgba(0,0,0,0.55);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        height: 100%;
      }

      body {
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }

      .page {
        position: relative;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }

      .center {
        text-align: center;
        line-height: 1;
        letter-spacing: -0.035em;
        opacity: 0;
        transform: translateY(6px);
        animation: fade 1.2s ease forwards;
      }

      .title {
        font-size: clamp(2.6rem, 6.5vw, 5.5rem);
        font-weight: 500;
        display: inline-flex;
        align-items: baseline;
        gap: 0.2em;
      }

      .kuon {
        color: var(--text);
      }

      .studio {
        color: var(--soft);
      }

      .divider {
        color: var(--soft);
        margin: 0 0.1em;
      }

      .kanji {
        color: var(--mid);
        font-size: 0.95em;
        letter-spacing: 0.02em;
        transform: translateY(0.04em); /* optical alignment */
      }

      .meta {
        position: absolute;
        bottom: 40px;
        left: 40px;
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        color: var(--muted);
        line-height: 1.6;
      }

      .email {
        display: block;
        text-transform: none;
        font-size: 0.9rem;
        letter-spacing: 0.01em;
        color: var(--text);
        text-decoration: none;
        margin-bottom: 8px;
      }

      .email:hover {
        opacity: 0.7;
      }

      @keyframes fade {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .center {
          animation: none;
          opacity: 1;
          transform: none;
        }
      }

      @media (max-width: 700px) {
        .center {
          text-align: left;
          width: 100%;
        }

        .meta {
          left: 24px;
          bottom: 24px;
        }
      }
    </style>
  </head>

  <body>
    <div class="page">

      <div class="center">
        <div class="title">
          <span class="kuon">KUON</span>
          <span class="studio">STUDIO</span>
          <span class="divider">|</span>
          <span class="kanji">久音</span>
        </div>
      </div>

      <div class="meta">
        <a class="email" href="mailto:hello@kuon.studio">hello@kuon.studio</a>
        London / Taipei / Tokyo
      </div>

    </div>
  </body>
</html>
