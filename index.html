<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KUON STUDIO | 久音</title>
    <meta
      name="description"
      content="KUON STUDIO | 久音 — Sound Architecture Practice"
    />
    <style>
      :root {
        --bg: #f5f3ee;
        --text: #111111;
        --muted: #5f5a52;
        --rule: rgba(17, 17, 17, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Times New Roman", Georgia, serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      .page {
        min-height: 100vh;
        display: flex;
        justify-content: flex-start;
        align-items: flex-start;
        padding: 120px 28px 48px 10vw;
      }

      .panel {
        width: min(560px, 100%);
        opacity: 0;
        transform: translateY(8px);
        animation: fadeIn 1.4s ease forwards;
      }

      .rule,
      .footer-rule {
        width: 100%;
        max-width: 520px;
        height: 1px;
        background: var(--rule);
      }

      .rule {
        margin-bottom: 28px;
      }

      .brand {
        margin: 0;
        font-size: clamp(1.8rem, 3vw, 2.5rem);
        font-weight: 400;
        letter-spacing: 0.07em;
        line-height: 1.2;
      }

      .descriptor {
        margin: 10px 0 0 0;
        font-size: 0.95rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .statement {
        margin: 42px 0 0 0;
        max-width: 32ch;
        font-size: clamp(1.15rem, 2vw, 1.45rem);
        line-height: 1.6;
        font-style: italic;
      }

      .meta {
        margin-top: 42px;
        font-size: 0.98rem;
        line-height: 1.9;
        color: var(--muted);
      }

      .email {
        color: var(--text);
        text-decoration: none;
        border-bottom: 1px solid rgba(17, 17, 17, 0.22);
        padding-bottom: 1px;
      }

      .email:hover {
        border-bottom-color: rgba(17, 17, 17, 0.5);
      }

      .footer-rule {
        margin-top: 56px;
      }

      .footer {
        margin-top: 18px;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .panel {
          opacity: 1;
          transform: none;
          animation: none;
        }
      }

      @media (max-width: 640px) {
        .page {
          align-items: flex-start;
          padding-top: 72px;
        }

        .statement {
          max-width: 100%;
        }

        .footer-rule {
          margin-top: 44px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <div class="rule"></div>

        <h1 class="brand">KUON STUDIO | 久音</h1>
        <p class="descriptor">Sound Architecture Practice</p>

        <p class="statement">
          A studio concerned with sound, form, and permanence.
        </p>

        <div class="meta">
          <a class="email" href="mailto:hello@kuon.studio">hello@kuon.studio</a>
        </div>

        <div class="footer-rule"></div>
        <div class="footer">London / Taipei / Tokyo</div>
      </section>
    </main>
  </body>
</html>
