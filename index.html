<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KUON STUDIO | 久音</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #fcfbf8;
      --text: #111;
      --muted: rgba(0,0,0,0.45);
      --kanji: rgba(0,0,0,0.12);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Red Hat Display", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .wrap {
      width: min(900px, 100%);
      opacity: 0;
      transform: translateY(8px);
      animation: fadeIn 1.2s ease forwards;
    }

    /* MAIN COMPOSITION */
    .hero {
      display: grid;
      grid-template-columns: auto auto;
      justify-content: center;
      align-items: center;
      gap: 1.2em;
    }

    /* LATIN BLOCK */
    .latin {
      font-size: clamp(2.8rem, 6.5vw, 5.6rem);
      font-weight: 600;
      line-height: 0.85;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .latin div + div {
      margin-top: 0.04em;
    }

    /* KANJI BLOCK */
    .kanji {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 1.85em; /* matches KUON+STUDIO block visually */
      font-size: clamp(3.2rem, 7.5vw, 6.4rem);
      line-height: 1;
      color: var(--kanji);
      letter-spacing: 0;
    }

    /* META */
    .meta {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .email {
      display: inline-block;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.18s ease, text-decoration-color 0.18s ease;
    }

    .email:hover {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 0.14em;
    }

    .locations {
      margin-top: 0.3rem;
    }

    /* ANIMATION */
    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .wrap {
        opacity: 1;
        transform: none;
        animation: none;
      }
    }

    /* MOBILE */
    @media (max-width: 700px) {
      .hero {
        gap: 0.6em;
      }

      .latin {
        font-size: clamp(2.2rem, 10vw, 3.8rem);
      }

      .kanji {
        font-size: clamp(2.6rem, 12vw, 4.2rem);
        height: 1.7em;
      }
    }

  </style>
</head>

<body>

  <main class="page">
    <section class="wrap">

      <div class="hero">
        <div class="latin">
          <div>KUON</div>
          <div>STUDIO</div>
        </div>

        <div class="kanji">
          <div>久</div>
          <div>音</div>
        </div>
      </div>

      <div class="meta">
        <a class="email" href="mailto:hello@kuon.studio">hello@kuon.studio</a>
        <div class="locations">London / Taipei</div>
      </div>

    </section>
  </main>

</body>
</html>
