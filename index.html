<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUON STUDIO</title>

<style>
body {
  margin: 0;
  background: #f2f1ed;
  color: #0d0d0d;
  font-family: Arial, Helvetica, sans-serif;
}

.container {
  padding: 80px 120px;
  max-width: 1400px;
}

/* TOP ROW */

.top {
  display: flex;
  justify-content: space-between;
  font-size: 0.9rem;
  margin-bottom: 20px;
}

.rule {
  height: 1px;
  background: #0d0d0d;
  opacity: 0.3;
  margin-bottom: 60px;
}

/* MAIN CONTENT */

.title {
  font-size: 3.5rem;
  font-weight: bold;
  line-height: 1.1;
  margin-bottom: 20px;
}

.text {
  max-width: 420px;
  line-height: 1.6;
  margin-bottom: 30px;
}

.small-rule {
  width: 60px;
  height: 3px;
  background: #0d0d0d;
  margin-bottom: 20px;
}

.email {
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* RESPONSIVE */

@media (max-width: 800px) {
  .container {
    padding: 40px;
  }

  .title {
    font-size: 2.2rem;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="top">
    <div>KUON STUDIO</div>
    <div>LONDON | TAIWAN</div>
  </div>

  <div class="rule"></div>

  <div class="title">
    SOUND, GIVEN STRUCTURE
  </div>

  <div class="text">
    Kuon Studio is a sound architecture practice concerned with how sound becomes real in the world.
  </div>

  <div class="small-rule"></div>

  <div class="email">
    HELLO@KUON.STUDIO
  </div>

</div>

</body>
</html>
