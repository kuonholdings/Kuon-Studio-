<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KUON STUDIO</title>

  <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: #f2f1ed;
      color: #111111;
      font-family: Arial, Helvetica, sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Wrapper aligned to the right */

    .wrap {
      position: absolute;
      top: 50%;
      right: 10vw; /* controls horizontal position */
      transform: translateY(-55%);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    /* Datum line */

    .line {
      height: 1px;
      width: 60vw; /* controls how far it reaches left */
      background: rgba(111, 134, 168, 0.6);
      margin-bottom: 14px;
    }

    /* Title */

    .center {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      text-align: right;
    }

    .jp {
      margin-left: 6px;
      font-family: 'Zhi Mang Xing', cursive;
      font-size: 1.85rem;
      position: relative;
      top: 1px;
      text-transform: none;
    }

    /* Email */

    .email {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #444444;
    }

    .email a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.25s ease;
    }

    .email a:hover {
      border-bottom: 1px solid #111111;
    }

    /* Responsive */

    @media (max-width: 640px) {
      .wrap {
        right: 8vw;
      }

      .center {
        font-size: 1.5rem;
      }

      .jp {
        font-size: 1.45rem;
      }

      .email {
        font-size: 0.82rem;
      }

      .line {
        width: 70vw;
      }
    }
  </style>
</head>

<body>

  <div class="wrap">

    <div class="line"></div>

    <div class="center">
      KUON STUDIO <span class="jp">久音</span>
    </div>

    <div class="email">
      <a href="mailto:hello@kuon.studio">hello@kuon.studio</a>
    </div>

  </div>

</body>
</html>
