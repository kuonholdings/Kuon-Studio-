<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KUON STUDIO | 久音</title>

  <!-- LATIN FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- CHINESE CALLIGRAPHY FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #fcfbf8;
      --text: #111;
      --muted: rgba(0,0,0,0.45);
      --kanji: rgba(0,0,0,0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Red Hat Display", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: min(900px, 100%);
      opacity: 0;
      transform: translateY(8px);
      animation: fadeIn 1.2s ease forwards;
    }

    /* LAYOUT */
    .hero {
      display: grid;
      grid-template-columns: auto auto;
      justify-content: center;
      align-items: center;
      gap: 1.4em;
    }

    /* LATIN */
    .latin {
      font-size: clamp(2.8rem, 6.5vw, 5.6rem);
      font-weight: 600;
      line-height: 0.85;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .latin div + div {
      margin-top: 0.04em;
    }

    /* KANJI (EXPANDED) */
    .kanji {
      display: flex;
      flex-direction: column;
      justify-content: center;
      font-family: "Zhi Mang Xing", cursive;
      font-size: clamp(4.5rem, 11vw, 8.5rem);
      line-height: 0.9;
      color: var(--kanji);
    }

    .kanji div:first-child {
      transform: translateY(-0.08em);
    }

    .kanji div:last-child {
      transform: translateY(0.08em);
    }

    /* META */
    .meta {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .email {
      display: inline-block;
      color: var(--muted);
      text-decoration: none;
      transition: 0.18s;
    }

    .email:hover {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 0.14em;
    }

    .locations {
      margin-top: 0.3rem;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .wrap {
        opacity: 1;
        transform: none;
        animation: none;
      }
    }

  </style>
</head>

<body>

  <div class="wrap">

    <div class="hero">
      <div class="latin">
        <div>KUON</div>
        <div>STUDIO</div>
      </div>

      <div class="kanji">
        <div>久</div>
        <div>音</div>
      </div>
    </div>

    <div class="meta">
      <a href="mailto:hello@kuon.studio" class="email">hello@kuon.studio</a>
      <div class="locations">London / Taipei</div>
    </div>

  </div>

</body>
</html>
