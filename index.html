<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>KUON STUDIO</title>
<meta name="description" content="KUON STUDIO" />
<meta name="theme-color" content="#ffffff" />

<style>
:root{

--bg:#ffffff;
--fg:#111111;
--fg-soft:rgba(0,0,0,0.42);
--muted-1:rgba(0,0,0,0.74);
--muted-2:rgba(0,0,0,0.62);
--muted-3:rgba(0,0,0,0.42);
--muted-4:rgba(0,0,0,0.24);

--pad-x:64px;
--pad-y:56px;

--mark:rgba(0,0,0,0.18);
--mark-h:1px;
--mark-l:22px;
--mark-gap:18px;

--hero-top:51vh;

--logo-size:56px;
--logo-track:0.15em;
--logo-pad:0.15em;
--logo-line-h:calc(var(--logo-size) * 1.12);

--meta-size:12px;
--meta-track:0.15em;

--sub-size:14px;
--sub-line:1.85;
--sub-track:0.10em;
--sub-gap:24px;

--nav-size:12px;
--nav-track:0.22em;
--nav-gap:36px;

--body-size:14px;
--body-line:1.85;
--body-track:0.10em;

--panel-width:640px;
--panel-min-h:220px;

--swap-ms:1200ms;
--swap-ease:cubic-bezier(.35,0,.25,1);

}

*{box-sizing:border-box}
html,body{height:100%}

body{
margin:0;
background:var(--bg);
color:var(--fg);
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif;
-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;
}

.wrap{
position:relative;
width:100%;
height:100%;
padding:var(--pad-y) var(--pad-x);
}

.crop{
position:fixed;
width:calc(var(--mark-l)+2px);
height:calc(var(--mark-l)+2px);
pointer-events:none;
opacity:.8;
}

.crop::before,
.crop::after{
content:"";
position:absolute;
background:var(--mark);
}

.crop::before{width:var(--mark-l);height:var(--mark-h)}
.crop::after{height:var(--mark-l);width:var(--mark-h)}

.crop.tl{top:var(--mark-gap);left:var(--mark-gap)}
.crop.tr{top:var(--mark-gap);right:var(--mark-gap);transform:scaleX(-1)}
.crop.bl{bottom:var(--mark-gap);left:var(--mark-gap);transform:scaleY(-1)}
.crop.br{bottom:var(--mark-gap);right:var(--mark-gap);transform:scale(-1)}

.corner{
position:fixed;
font-size:var(--meta-size);
letter-spacing:var(--meta-track);
text-transform:uppercase;
}

.top-left{top:calc(var(--mark-gap)-2px);left:calc(var(--mark-gap)+34px)}
.top-right{top:calc(var(--mark-gap)-2px);right:calc(var(--mark-gap)+34px);color:var(--muted-3)}
.bottom-left{left:calc(var(--mark-gap)+34px);bottom:calc(var(--mark-gap)-2px);color:var(--muted-3)}
.bottom-right{right:calc(var(--mark-gap)+34px);bottom:calc(var(--mark-gap)-2px)}

.sister-link{
color:var(--muted-3);
text-decoration:none;
}

.sister-link:hover{color:var(--fg)}

.lang-switch{
display:flex;
gap:10px;
}

.lang-btn{
background:transparent;
border:0;
cursor:pointer;
font:inherit;
color:var(--muted-3);
}

.lang-btn[aria-current="true"]{color:var(--fg)}

.center{
position:absolute;
left:50%;
top:var(--hero-top);
transform:translate(-50%,-50%);
width:min(980px,calc(100%-40px));
text-align:center;
}

.logoBox{
height:var(--logo-line-h);
display:flex;
align-items:center;
justify-content:center;
}

.logo{
margin:0;
font-size:var(--logo-size);
letter-spacing:var(--logo-track);
font-weight:700;
}

.brand{color:var(--fg)}
.division{color:var(--fg-soft)}

.subtitle{
margin:var(--sub-gap) 0 0;
font-size:var(--sub-size);
line-height:var(--sub-line);
letter-spacing:var(--sub-track);
color:var(--muted-1);
max-width:60ch;
margin-left:auto;
margin-right:auto;
}

.nav{
margin-top:var(--nav-gap);
display:flex;
justify-content:center;
gap:22px;
}

.nav button{
background:transparent;
border:0;
cursor:pointer;
font-size:var(--nav-size);
letter-spacing:var(--nav-track);
text-transform:uppercase;
color:var(--muted-3);
}

.nav button.active{color:var(--fg)}

.panel{
margin:22px auto 0;
max-width:var(--panel-width);
min-height:var(--panel-min-h);
display:flex;
align-items:center;
justify-content:center;
}

.body{
font-size:var(--body-size);
line-height:var(--body-line);
letter-spacing:var(--body-track);
color:var(--muted-1);
max-width:60ch;
margin:auto;
}

.email{
font-size:13px;
letter-spacing:.12em;
text-decoration:none;
color:var(--muted-2);
}

.email:hover{color:var(--fg)}

</style>
</head>

<body>

<div class="crop tl"></div>
<div class="crop tr"></div>
<div class="crop bl"></div>
<div class="crop br"></div>

<div class="corner top-left">
<a class="sister-link" href="https://kuonholdings.com">HOLDINGS</a>
</div>

<div class="corner top-right">
<span id="clockText"></span>
</div>

<div class="corner bottom-left">
<span id="footerBrand">KUON</span>
</div>

<div class="corner bottom-right">
<div class="lang-switch">
<button class="lang-btn" data-lang="en" aria-current="true">EN</button>
<span>/</span>
<button class="lang-btn" data-lang="zh">繁中</button>
</div>
</div>

<div class="wrap">

<main class="center">

<div class="logoBox">
<h1 class="logo">
<span class="brand">KUON</span>
<span class="division">STUDIO</span>
</h1>
</div>

<p class="subtitle" id="subtitle">
Objects, sound, and spatial design.
</p>

<div class="nav">
<button data-panel="studio" class="active">Studio</button>
<button data-panel="work">Work</button>
<button data-panel="contact">Contact</button>
</div>

<div class="panel">
<div id="panelContent" class="body"></div>
</div>

</main>
</div>

<script>

const CONTENT = {

en:{
subtitle:"Objects, sound, and spatial design.",

studio:`KUON Studio explores product, sound, and spatial ideas through design research and development.`,

work:`Selected work includes Neostein, ongoing instrument studies, and experimental audio objects.`,

contact:`<a class="email" href="mailto:info@kuon.studio">info@kuon.studio</a>`,

footer:"KUON",

clockZone:"Asia/Taipei",
clockLabel:"TPE"

},

zh:{
subtitle:"物件、聲音與空間設計。",

studio:`KUON Studio 專注於產品、聲音與空間概念的設計研究與開發。`,

work:`代表性項目包括 Neostein、樂器研究以及實驗性聲音裝置。`,

contact:`<a class="email" href="mailto:info@kuon.studio">info@kuon.studio</a>`,

footer:"久音",

clockZone:"Asia/Taipei",
clockLabel:"TPE"
}

}

let currentLang="en"
let currentPanel="studio"

const panel=document.getElementById("panelContent")
const subtitle=document.getElementById("subtitle")
const footerBrand=document.getElementById("footerBrand")

function render(){
const c=CONTENT[currentLang]
subtitle.textContent=c.subtitle
panel.innerHTML=c[currentPanel]
footerBrand.textContent=c.footer
}

document.querySelectorAll(".nav button").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
currentPanel=btn.dataset.panel
render()
}
})

document.querySelectorAll(".lang-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".lang-btn").forEach(b=>b.removeAttribute("aria-current"))
btn.setAttribute("aria-current","true")
currentLang=btn.dataset.lang
render()
}
})

function updateClock(){
const c=CONTENT[currentLang]

const fmt=new Intl.DateTimeFormat("en-GB",{
timeZone:c.clockZone,
year:"numeric",
month:"2-digit",
day:"2-digit",
hour:"2-digit",
minute:"2-digit",
hour12:false
})

document.getElementById("clockText").textContent=
fmt.format(new Date())+" "+c.clockLabel
}

render()
updateClock()
setInterval(updateClock,10000)

</script>

</body>
</html>
