<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KUON STUDIO | 久音</title>
    <meta
      name="description"
      content="KUON STUDIO | 久音 — Sound Architecture Practice"
    />
    <style>
      :root {
        --bg: #f3f1ec;
        --text: #111111;
        --muted: rgba(17, 17, 17, 0.58);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      .page {
        position: relative;
        min-height: 100vh;
        padding: 36px 40px 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .hero {
        text-align: center;
        line-height: 0.92;
        letter-spacing: -0.045em;
        opacity: 0;
        transform: translateY(10px);
        animation: fadeIn 1.2s ease forwards;
      }

      .hero .latin,
      .hero .kanji {
        display: block;
        font-weight: 500;
      }

      .hero .latin {
        font-size: clamp(3.4rem, 10vw, 8.6rem);
      }

      .hero .kanji {
        margin-top: 0.1em;
        font-size: clamp(3rem, 8.5vw, 7.2rem);
        letter-spacing: 0.02em;
      }

      .meta {
        position: absolute;
        left: 40px;
        bottom: 32px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        font-size: 0.76rem;
        line-height: 1.4;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .email {
        color: var(--text);
        text-decoration: none;
        text-transform: none;
        letter-spacing: 0.01em;
        font-size: 0.95rem;
      }

      .email:hover {
        opacity: 0.72;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .hero {
          opacity: 1;
          transform: none;
          animation: none;
        }
      }

      @media (max-width: 720px) {
        .page {
          padding: 28px 24px 24px;
        }

        .hero {
          text-align: left;
          width: 100%;
        }

        .meta {
          left: 24px;
          bottom: 24px;
          gap: 8px;
        }

        .email {
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero" aria-label="KUON STUDIO | 久音">
        <span class="latin">KUON STUDIO</span>
        <span class="kanji">久音</span>
      </section>

      <aside class="meta">
        <a class="email" href="mailto:hello@kuon.studio">hello@kuon.studio</a>
        <div>London / Taipei / Tokyo</div>
      </aside>
    </main>
  </body>
</html>
