<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KUON STUDIO</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: #f2f1ed;
      color: #111111;
      font-family: Arial, Helvetica, sans-serif;
      position: relative;
      overflow: hidden;
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
    }

    .bottom {
      position: absolute;
      left: 50%;
      bottom: 42px;
      transform: translateX(-50%);
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      text-transform: none;
      color: #444444;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      .center {
        font-size: 1.5rem;
      }

      .bottom {
        font-size: 0.82rem;
        bottom: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="center">KUON STUDIO</div>
  <div class="bottom">hello@kuon.studio</div>
</body>
</html>
