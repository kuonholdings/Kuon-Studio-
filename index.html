<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KUON STUDIO | 久音</title>

    <style>
      :root {
        --bg: #f3f1ec;
        --text: #111;
        --soft: rgba(0,0,0,0.28);
        --mid: rgba(0,0,0,0.45);
        --muted: rgba(0,0,0,0.55);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        height: 100%;
      }

      body {
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: var(--text);
      }

      .page {
        position: relative;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }

      .center {
        text-align: center;
        line-height: 1;
        letter-spacing: -0.035em;
        animation: fade 1.2s ease forwards;
        opacity: 0;
      }

      .title {
        font-size: clamp(2.8rem, 7vw, 6rem);
        font-weight: 500;
        display: inline-flex;
        align-items: baseline;
        gap: 0.25em;
      }

      /* ===== OPTION STYLES ===== */

      /* OPTION 1 (current refined) */
      .opt1 .kuon { color: var(--text); }
      .opt1 .studio { color: var(--soft); }
      .opt1 .kanji { color: var(--mid); }

      /* OPTION 2 (Kuon + 久音 same weight) */
      .opt2 .kuon { color: var(--text); }
      .opt2 .studio { color: var(--soft); }
      .opt2 .kanji { color: var(--text); }

      /* OPTION 3 (more contrast + subtle divider removal feel) */
      .opt3 .kuon { color: var(--text); }
      .opt3 .studio { color: var(--soft); letter-spacing: -0.01em; }
      .opt3 .divider { opacity: 0.3; }
      .opt3 .kanji { color: var(--mid); transform: translateY(0.04em); }

      .divider {
        color: var(--soft);
        margin: 0 0.15em;
      }

      .kanji {
        font-size: 0.95em;
        letter-spacing: 0.02em;
      }

      .meta {
        position: absolute;
        bottom: 40px;
        left: 40px;
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        color: var(--muted);
        line-height: 1.6;
      }

      .email {
        display: block;
        text-transform: none;
        font-size: 0.9rem;
        letter-spacing: 0.01em;
        color: var(--text);
        text-decoration: none;
        margin-bottom: 8px;
      }

      @keyframes fade {
        to { opacity: 1; }
      }

      @media (max-width: 700px) {
        .center { text-align: left; }
        .meta { left: 24px; bottom: 24px; }
      }
    </style>
  </head>

  <body>
    <div class="page">

      <!-- SWITCH BETWEEN opt1 / opt2 / opt3 HERE -->
      <div class="center opt2">
        <div class="title">
          <span class="kuon">KUON</span>
          <span class="studio">STUDIO</span>
          <span class="divider">|</span>
          <span class="kanji">久音</span>
        </div>
      </div>

      <div class="meta">
        <a class="email" href="mailto:hello@kuon.studio">hello@kuon.studio</a>
        London / Taipei / Tokyo
      </div>

    </div>
  </body>
</html>
