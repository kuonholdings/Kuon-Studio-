<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KUON STUDIO | 久音</title>

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #fcfbf8;
      --text: #111111;
      --muted: rgba(0, 0, 0, 0.48);
      --watermark: rgba(0, 0, 0, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Red Hat Display", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .wrap {
      position: relative;
      width: min(900px, 100%);
      opacity: 0;
      transform: translateY(8px);
      animation: fadeIn 1.2s ease forwards;
    }

    .hero {
      position: relative;
      display: inline-block;
      margin: 0 auto;
      left: 50%;
      transform: translateX(-50%);
    }

    .latin {
      position: relative;
      z-index: 2;
      font-size: clamp(3rem, 7vw, 6.25rem);
      font-weight: 600;
      line-height: 0.86;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .latin div + div {
      margin-top: 0.04em;
    }

    .kanji {
      position: absolute;
      top: -0.04em;
      right: -1.1em;
      z-index: 1;
      font-size: clamp(5.5rem, 13vw, 10.5rem);
      line-height: 0.9;
      color: var(--watermark);
      pointer-events: none;
      user-select: none;
    }

    .meta {
      margin-top: 2.2rem;
      text-align: center;
    }

    .practice {
      font-size: 0.95rem;
      line-height: 1.4;
      letter-spacing: 0.02em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .email {
      display: inline-block;
      font-size: 0.95rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.18s ease, text-decoration-color 0.18s ease;
    }

    .email:hover {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 0.14em;
    }

    .locations {
      margin-top: 0.35rem;
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .wrap {
        opacity: 1;
        transform: none;
        animation: none;
      }
    }

    @media (max-width: 700px) {
      .latin {
        font-size: clamp(2.4rem, 12vw, 4.2rem);
        letter-spacing: 0.1em;
      }

      .kanji {
        right: -0.8em;
        font-size: clamp(4rem, 20vw, 7rem);
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="wrap">

      <div class="hero">
        <div class="latin">
          <div>KUON</div>
          <div>STUDIO</div>
        </div>
        <div class="kanji">久音</div>
      </div>

      <div class="meta">
        <div class="practice">Sound Architecture Practice</div>
        <a class="email" href="mailto:guy@kuon.studio">guy@kuon.studio</a>
        <div class="locations">London / Taipei</div>
      </div>

    </section>
  </main>
</body>
</html>
