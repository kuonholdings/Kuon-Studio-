<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KUON STUDIO | 久音</title>

  <style>
    :root {
      --bg: #f3f1ec;
      --text: #111;
      --muted: rgba(0,0,0,0.5);
      --light: rgba(0,0,0,0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: grid;
      grid-template-columns: auto 1px auto;
      gap: 40px;
      align-items: center;
      width: min(1100px, 90%);
    }

    /* LEFT INFO */
    .info {
      text-align: right;
      font-size: 0.8rem;
      line-height: 1.6;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .email {
      display: block;
      margin-top: 10px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
    }

    /* DIVIDER */
    .line {
      width: 1px;
      height: 120px;
      background: var(--light);
    }

    /* RIGHT TITLE */
    .title {
      font-size: clamp(3rem, 7vw, 6rem);
      font-weight: 600;
      line-height: 0.9;
      letter-spacing: -0.03em;
    }

    .studio {
      color: var(--light);
      font-weight: 500;
    }

    .kanji {
      font-size: 0.9em;
      color: var(--light);
      margin-top: 0.2em;
    }

    /* MOBILE */
    @media (max-width: 700px) {
      .container {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .info {
        text-align: left;
      }

      .line {
        display: none;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LEFT -->
    <div class="info">
      Sound Architecture Practice<br>
      <a href="mailto:hello@kuon.studio" class="email">hello@kuon.studio</a>
      London / Taipei / Tokyo
    </div>

    <!-- DIVIDER -->
    <div class="line"></div>

    <!-- RIGHT -->
    <div class="title">
      KUON<br>
      <span class="studio">STUDIO</span><br>
      <div class="kanji">久音</div>
    </div>

  </div>

</body>
</html>
