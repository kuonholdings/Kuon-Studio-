<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KUON STUDIO</title>

<link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">

<style>
html, body {
  height: 100%;
  margin: 0;
}

body {
  background: #f2f1ed;
  color: #111111;
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;
}

/* Top-right link */

.nav-link {
  position: absolute;
  top: 28px;
  right: 40px;
  font-size: 0.8rem;
  color: #777777;
  opacity: 0.7;
}

.nav-link a {
  text-decoration: none;
  color: inherit;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: all 0.25s ease;
}

.arrow {
  transition: transform 0.25s ease;
}

.nav-link a:hover {
  color: #111111;
  opacity: 1;
}

.nav-link a:hover .arrow {
  transform: translateX(4px);
}

/* Main block */

.wrap {
  position: absolute;
  top: 50%;
  right: 10vw;
  transform: translateY(-55%);
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

/* Label */

.label {
  margin-bottom: 6px;
  font-size: 0.7rem;
  color: #777777;
  letter-spacing: 0.08em;
  text-transform: lowercase;
}

/* Line */

.line {
  height: 1px;
  width: 60vw;
  background: #111111;
  opacity: 0.6;
  margin-bottom: 14px;
}

/* Title */

.center {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.04em;
  text-transform: uppercase;
  text-align: right;
  white-space: nowrap;
}

.jp {
  margin-left: 6px;
  font-family: 'Zhi Mang Xing', cursive;
  font-size: 1.85rem;
  position: relative;
  top: 1px;
}

/* Info */

.email {
  margin-top: 20px;
  font-size: 0.9rem;
  color: #444444;
}

.email a {
  color: inherit;
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.25s ease;
}

.email a:hover {
  border-bottom: 1px solid #111111;
}

.location {
  margin-top: 4px;
  font-size: 0.9rem;
  color: #444444;
}

/* Year */

.year {
  position: absolute;
  bottom: 40px;
  right: 40px;
  font-size: 0.75rem;
  color: #777777;
  transform: rotate(90deg);
  transform-origin: right bottom;
}

/* Responsive */

@media (max-width: 640px) {
  .wrap { right: 8vw; }
  .center { font-size: 1.5rem; }
  .jp { font-size: 1.45rem; }
  .line { width: 70vw; }
}
</style>
</head>

<body>

<div class="nav-link">
  <a href="https://kuonholdings.com">
    Holdings <span class="arrow">→</span>
  </a>
</div>

<div class="wrap">
  <div class="label">sound architecture</div>
  <div class="line"></div>

  <div class="center">
    KUON STUDIO <span class="jp">久音</span>
  </div>

  <div class="email">
    <a href="mailto:hello@kuon.studio">hello@kuon.studio</a>
  </div>

  <div class="location">
    London | Taiwan
  </div>
</div>

<div class="year">2027</div>

</body>
</html>
