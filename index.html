<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KUON STUDIO</title>

  <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: #f2f1ed;
      color: #111111;
      font-family: Arial, Helvetica, sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Top */

    .top {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.8rem;
      color: #777777;
      letter-spacing: 0.03em;
    }

    /* Center container */

    .center-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      display: flex;
      align-items: center;
    }

    /* Datum line */

    .line {
      height: 2px;
      width: 40vw;
      background: #6f86a8; /* studio blue */
      margin-right: 16px;
    }

    /* Title */

    .center {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .jp {
      margin-left: 6px;
      font-family: 'Zhi Mang Xing', cursive;
      font-size: 1.85rem;
      position: relative;
      top: 1px;
      text-transform: none;
    }

    /* Email */

    .bottom {
      position: absolute;
      left: 50%;
      bottom: 42px;
      transform: translateX(-50%);
      font-size: 0.9rem;
      color: #444444;
    }

    .bottom a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.25s ease;
    }

    .bottom a:hover {
      border-bottom: 1px solid #111111;
    }

    /* Responsive */

    @media (max-width: 640px) {
      .line {
        width: 25vw;
      }

      .center {
        font-size: 1.5rem;
      }

      .jp {
        font-size: 1.45rem;
      }

      .bottom {
        font-size: 0.82rem;
        bottom: 28px;
      }
    }
  </style>
</head>

<body>

  <div class="top">London | Taiwan</div>

  <div class="center-wrap">
    <div class="line"></div>
    <div class="center">
      KUON STUDIO <span class="jp">久音</span>
    </div>
  </div>

  <div class="bottom">
    <a href="mailto:hello@kuon.studio">hello@kuon.studio</a>
  </div>

</body>
</html>
