<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KUON STUDIO</title>

  <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: #f2f1ed;
      color: #111111;
      font-family: Arial, Helvetica, sans-serif;
      position: relative;
      overflow: hidden;
    }

    .line {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 1px;
      background: rgba(111, 134, 168, 0.6);
      transform: translateY(-50%);
      z-index: 1;
    }

    .center-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
    }

    .center {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      text-align: center;
      background: #f2f1ed;
      padding: 0 12px;
    }

    .jp {
      margin-left: 6px;
      font-family: 'Zhi Mang Xing', cursive;
      font-size: 1.85rem;
      line-height: 1;
      position: relative;
      top: 1px;
      text-transform: none;
    }

    .email {
      margin-top: 28px;
      font-size: 0.9rem;
      color: #444444;
      white-space: nowrap;
    }

    .email a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.25s ease;
    }

    .email a:hover {
      border-bottom: 1px solid #111111;
    }

    @media (max-width: 640px) {
      .center {
        font-size: 1.5rem;
      }

      .jp {
        font-size: 1.45rem;
      }

      .email {
        font-size: 0.82rem;
        margin-top: 22px;
      }
    }
  </style>
</head>

<body>

  <div class="line"></div>

  <div class="center-wrap">
    <div class="center">
      KUON STUDIO <span class="jp">久音</span>
    </div>

    <div class="email">
      <a href="mailto:hello@kuon.studio">hello@kuon.studio</a>
    </div>
  </div>

</body>
</html>
